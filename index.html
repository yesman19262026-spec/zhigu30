<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#082f2d" />
    <meta name="description" content="知股30天——面向零基础投资者的免费系统投教小程序" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <title>知股30天</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">免费 · 公益投教</p>
          <h1>知股30天</h1>
        </div>
        <button id="installButton" class="ghost-button" hidden>安装</button>
      </header>

      <main id="app" aria-live="polite"></main>

      <nav class="tabbar" aria-label="主要导航">
        <button class="tab-item active" data-page="today" aria-current="page">
          <span class="tab-icon">⌂</span><span>今日</span>
        </button>
        <button class="tab-item" data-page="courses">
          <span class="tab-icon">▤</span><span>课程</span>
        </button>
        <button class="tab-item" data-page="market">
          <span class="tab-icon">⌁</span><span>市场</span>
        </button>
        <button class="tab-item" data-page="labs">
          <span class="tab-icon">◇</span><span>实验室</span>
        </button>
        <button class="tab-item" data-page="profile">
          <span class="tab-icon">○</span><span>我的</span>
        </button>
      </nav>
    </div>

    <dialog id="lessonDialog" class="lesson-dialog">
      <button class="dialog-close" aria-label="关闭">×</button>
      <div id="lessonContent"></div>
    </dialog>

    <div id="toast" class="toast" role="status"></div>
    <script src="./market-config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
